name: alanya
description: "Alanya — application de messagerie instantanée."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Réseau / API
  http: ^1.2.2
  http_parser: ^4.0.2
  # Stockage sécurisé des tokens JWT
  # v10 : corrige le build natif Linux (json.hpp) avec les clang récents.
  flutter_secure_storage: ^10.3.1
  # Gestion d'état
  provider: ^6.1.2
  # Temps réel (messagerie) — client WebSocket pur Dart (web + desktop)
  web_socket_channel: ^3.0.1
  # Sélection de fichiers (images) pour l'envoi de médias
  file_picker: ^8.1.6
  # Mobile : enregistrement vocal, lecture audio, téléchargement
  record: ^7.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  # Lecture vidéo intégrée (mini lecteur in-app)
  video_player: ^2.9.2
  # Lecture PDF intégrée (natif Android/iOS, léger, stable)
  flutter_pdfview: ^1.4.4
  # Sauvegarde dans le stockage public via MediaStore API (Android 10+ safe)
  media_store_plus: ^0.1.3
  # Appels audio/vidéo WebRTC
  flutter_webrtc: ^0.12.12
  permission_handler: ^11.3.1
  # Lecture du répertoire téléphonique natif (Android + iOS)
  flutter_contacts: ^1.1.9+2
  # Champ de saisie du code OTP à 6 chiffres
  pin_code_fields: ^8.0.1
  # Internationalisation / préférences
  shared_preferences: ^2.2.3
  # Notifications locales (canaux + permissions Android)
  flutter_local_notifications: ^18.0.1
  # Notifications push FCM (Firebase Cloud Messaging)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  # Base de données locale (cache des messages hors ligne)
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

# Icône Android / iOS — source : assets/images/app_icon.png
# Génération : bash ../scripts/setup-app-icon.sh
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
